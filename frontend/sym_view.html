<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>Symmetric View (Party B) — CryptoJS PoC</title>
<link rel="stylesheet" href="/css/style.css"/>
</head>
<body>
<nav class="nav">
  <a class="nav-brand" href="/"><span class="lock-icon">🔐</span> CryptoJS PoC</a>
  <div class="nav-links">
    <a class="nav-link" href="/">Home</a>
    <a class="nav-link" href="/asym_submit.html">Asym Submit</a>
    <a class="nav-link" href="/asym_view.html">Asym View</a>
    <a class="nav-link" href="/sym_submit.html">Sym Submit</a>
    <a class="nav-link active" href="/sym_view.html">Sym View</a>
  </div>
</nav>

<div class="container">
  <div class="page-header">
    <div class="page-title">📥 Symmetric Encryption — Party B</div>
    <div class="page-subtitle">Decrypt the AES key with Party B's private key, then read and edit the secret message</div>
  </div>

  <!-- Password box for Party B -->
  <div class="password-box">
    <div>
      <label class="form-label">Party B Private Key Password</label>
      <div class="password-hint">Default PoC password: PartyB@PoC2024</div>
    </div>
    <input id="partyB-pass" class="form-input" type="password"
           placeholder="Enter Party B key password…" value="PartyB@PoC2024" style="max-width:300px;"/>
  </div>

  <div class="split-pane">
    <!-- Left: record list -->
    <div>
      <div class="card">
        <div class="card-title" style="justify-content:space-between;">
          <span>📋 Records</span>
          <button class="btn btn-ghost btn-sm" onclick="loadRecords()">🔄 Refresh</button>
        </div>
        <div id="record-list">
          <div class="empty-state"><div class="spinner" style="margin:0 auto 1rem;width:24px;height:24px;border-width:3px;"></div>Loading…</div>
        </div>
      </div>
    </div>

    <!-- Right: detail pane -->
    <div id="detail-pane">
      <div class="card">
        <div style="text-align:center;padding:3rem 1rem;color:var(--text-muted);">
          <div style="font-size:3rem;margin-bottom:1rem;">←</div>
          Select a record to decrypt and edit
        </div>
      </div>
    </div>
  </div>
</div>

<!-- Libraries -->
<script src="https://cdn.jsdelivr.net/npm/node-forge@1.3.1/dist/forge.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/crypto-js/4.2.0/crypto-js.min.js"></script>
<script>
/* ── State ──────────────────────────────────────────────────────────────── */
let records = [];
let selectedId   = null;
let currentAesKeyHex = null; // AES key held in memory after unlock

/* ── Utilities ──────────────────────────────────────────────────────────── */
function isEncrypted(val) {
  return typeof val === 'string' && /^%\*ENCRYPTED\*%\(.+\)$/.test(val.trim());
}
function extractBase64(val) {
  const m = val.match(/^%\*ENCRYPTED\*%\((.+)\)$/);
  return m ? m[1] : null;
}
function formatEncrypted(base64) {
  return `%*ENCRYPTED*%(${base64})`;
}
function shortDate(iso) {
  return new Date(iso).toLocaleString();
}
function escHtml(s) {
  return String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');
}

/* ── AES-256-CBC decrypt ─────────────────────────────────────────────────── */
function aesDecrypt(aesKeyHex, base64Combined) {
  const key      = CryptoJS.enc.Hex.parse(aesKeyHex);
  const combined = CryptoJS.enc.Base64.parse(base64Combined);
  // First 16 bytes = IV, rest = ciphertext
  const ivWords  = combined.words.slice(0, 4);
  const iv       = CryptoJS.lib.WordArray.create(ivWords, 16);
  const ctWords  = combined.words.slice(4);
  const ct       = CryptoJS.lib.WordArray.create(ctWords, combined.sigBytes - 16);
  const dec      = CryptoJS.AES.decrypt(
    { ciphertext: ct }, key,
    { iv, mode: CryptoJS.mode.CBC, padding: CryptoJS.pad.Pkcs7 }
  );
  return dec.toString(CryptoJS.enc.Utf8);
}

/* ── AES-256-CBC encrypt ─────────────────────────────────────────────────── */
function aesEncrypt(aesKeyHex, plaintext) {
  const key = CryptoJS.enc.Hex.parse(aesKeyHex);
  const iv  = CryptoJS.lib.WordArray.random(16);
  const enc = CryptoJS.AES.encrypt(
    CryptoJS.enc.Utf8.parse(plaintext), key,
    { iv, mode: CryptoJS.mode.CBC, padding: CryptoJS.pad.Pkcs7 }
  );
  const combined = iv.concat(enc.ciphertext);
  return CryptoJS.enc.Base64.stringify(combined);
}

/* ── Load records ────────────────────────────────────────────────────────── */
async function loadRecords() {
  const list = document.getElementById('record-list');
  list.innerHTML = '<div class="empty-state"><div class="spinner" style="margin:0 auto 1rem;width:24px;height:24px;border-width:3px;"></div>Loading…</div>';

  try {
    const res = await fetch('/api/sym/records');
    records = await res.json();

    if (records.length === 0) {
      list.innerHTML = `<div class="empty-state">
        <div class="empty-icon">📭</div>
        No records yet.<br>
        <a href="/sym_submit.html" style="color:var(--secondary);margin-top:0.5rem;display:inline-block;">Party A sends a message →</a>
      </div>`;
      return;
    }

    list.innerHTML = '<div class="record-list">' +
      records.map(r => `
        <div class="record-item ${r.id === selectedId ? 'selected' : ''}"
             onclick="selectRecord('${r.id}')">
          <div class="record-item-serial">${r.serial}</div>
          <div class="record-item-meta">${r.public_text.substring(0,40)}${r.public_text.length>40?'…':''}</div>
          <div class="record-item-meta" style="display:flex;gap:0.5rem;margin-top:0.3rem;">
            <span class="badge badge-enc">🔒 encrypted</span>
            <span>${shortDate(r.created_at)}</span>
          </div>
        </div>
      `).join('') +
    '</div>';

    if (selectedId) {
      const r = records.find(x => x.id === selectedId);
      if (r) renderDetail(r);
    }
  } catch (e) {
    list.innerHTML = `<div class="empty-state" style="color:var(--danger);">Error: ${e.message}</div>`;
  }
}

/* ── Select record ───────────────────────────────────────────────────────── */
function selectRecord(id) {
  selectedId = id;
  currentAesKeyHex = null; // reset key when switching records
  const r = records.find(x => x.id === id);
  if (r) renderDetail(r);
  document.querySelectorAll('.record-item').forEach(el => {
    el.classList.toggle('selected', el.getAttribute('onclick').includes(`'${id}'`));
  });
}

/* ── Render detail pane ─────────────────────────────────────────────────── */
function renderDetail(r) {
  const symKeyB64  = r.encrypted_sym_key; // raw base64 (no wrapper)
  const secretB64  = extractBase64(r.encrypted_secret) || '';

  document.getElementById('detail-pane').innerHTML = `
    <div class="card">
      <div class="card-title">🔍 Record Detail</div>

      <div class="form-group">
        <label class="form-label">ID</label>
        <div class="enc-value" style="color:var(--text-muted);font-size:0.7rem;">${r.id}</div>
      </div>
      <div class="form-group">
        <label class="form-label">Serial</label>
        <div class="enc-value" style="color:var(--primary);">${r.serial}</div>
      </div>
      <div class="form-group">
        <label class="form-label">Public Text <span class="badge badge-plain" style="margin-left:0.5rem;">plain</span></label>
        <div class="enc-value">${escHtml(r.public_text)}</div>
      </div>

      <hr class="divider"/>
      <div class="card-title">🗝️ Encrypted Symmetric Key (for Party B)</div>
      <div class="form-group">
        <div class="enc-value" style="color:var(--enc-text);">${symKeyB64.substring(0,64)}…</div>
        <div class="enc-hint">RSA-4096-OAEP base64 — AES-256 key sealed for Party B's private key</div>
      </div>

      <div class="card-title" style="margin-top:1rem;">🔒 Encrypted Secret Text</div>
      <div class="form-group">
        <div class="enc-value" id="enc-secret-display">
          <span class="enc-label">%*ENCRYPTED*%</span><span style="color:var(--enc-text);">(${secretB64.substring(0,48)}…)</span>
        </div>
        <div class="enc-hint">AES-256-CBC ciphertext — first 16 bytes of base64 payload are the IV</div>
      </div>

      <hr class="divider"/>
      <div class="card-title">🔓 Decrypt &amp; Edit</div>
      <div class="info-block">
        Click <strong>Decrypt</strong> to unwrap the AES key with Party B's private key and
        reveal the plaintext. You can then edit the text and re-encrypt with <strong>Update</strong>.
      </div>

      <div class="btn-group" style="margin-top:0;">
        <button class="btn btn-primary" onclick="decryptRecord('${r.id}')">🔓 Decrypt</button>
      </div>
      <div id="dec-status" class="status"></div>

      <!-- Decrypted editable section (shown after decrypt) -->
      <div id="dec-section" style="display:none;">
        <hr class="divider"/>
        <div class="form-group">
          <label class="form-label">
            Decrypted Secret Text
            <span class="badge badge-plain" style="margin-left:0.5rem;">plaintext</span>
          </label>
          <textarea id="plaintext-edit" class="form-textarea" rows="4"
                    placeholder="Decrypted text will appear here…"></textarea>
          <div class="form-hint">Edit this text and click Update to re-encrypt and save.</div>
        </div>

        <div class="btn-group">
          <button class="btn btn-success" onclick="updateRecord('${r.id}')">💾 Update</button>
          <button class="btn btn-ghost" onclick="loadRecords()">🔄 Refresh List</button>
        </div>
        <div id="update-status" class="status"></div>
      </div>

      <hr class="divider"/>
      <div style="color:var(--text-muted);font-size:0.75rem;">
        Created: ${shortDate(r.created_at)} &nbsp;|&nbsp; Updated: ${shortDate(r.updated_at)}
      </div>
    </div>
  `;
}

/* ── Decrypt ─────────────────────────────────────────────────────────────── */
async function decryptRecord(id) {
  const r        = records.find(x => x.id === id);
  const password = document.getElementById('partyB-pass').value;
  if (!r || !password) { decStatus('Record and password required', 'error'); return; }

  try {
    decStatus('Fetching Party B private key…', 'loading');
    const privRes = await fetch('/api/sym/partyB/private-key');
    if (!privRes.ok) throw new Error('Could not fetch Party B private key');
    const privKeyPem = await privRes.text();

    decStatus('Decrypting Party B private key with password…', 'loading');
    await new Promise(r => setTimeout(r, 30));
    const privateKeyB = forge.pki.decryptRsaPrivateKey(privKeyPem, password);
    if (!privateKeyB) throw new Error('Invalid Party B password');

    decStatus('Unwrapping AES-256 key with Party B RSA-4096 private key…', 'loading');
    await new Promise(r => setTimeout(r, 30));
    const encAesB64   = records.find(x => x.id === id).encrypted_sym_key; // raw base64
    const encAesBytes = forge.util.decode64(encAesB64);
    const aesKeyRaw   = privateKeyB.decrypt(encAesBytes, 'RSA-OAEP', {
      md:   forge.md.sha256.create(),
      mgf1: { md: forge.md.sha256.create() }
    });
    currentAesKeyHex = forge.util.bytesToHex(aesKeyRaw);

    decStatus('Decrypting SecretText with AES-256-CBC…', 'loading');
    const encSecretB64 = extractBase64(r.encrypted_secret);
    const plaintext    = aesDecrypt(currentAesKeyHex, encSecretB64);
    if (!plaintext) throw new Error('AES decryption failed — data may be corrupt');

    decStatus('Decryption successful!', 'success');
    document.getElementById('dec-section').style.display = 'block';
    document.getElementById('plaintext-edit').value = plaintext;

  } catch (err) {
    decStatus(err.message, 'error');
    currentAesKeyHex = null;
    console.error(err);
  }
}

/* ── Update record ───────────────────────────────────────────────────────── */
async function updateRecord(id) {
  if (!currentAesKeyHex) {
    updStatus('Decrypt the record first to get the AES key.', 'error');
    return;
  }
  const plaintext = document.getElementById('plaintext-edit').value;
  if (!plaintext.trim()) { updStatus('Cannot save empty text.', 'error'); return; }

  try {
    updStatus('Re-encrypting with AES-256-CBC…', 'loading');
    const newB64      = aesEncrypt(currentAesKeyHex, plaintext);
    const newEncValue = formatEncrypted(newB64);

    updStatus('Saving to server…', 'loading');
    const res = await fetch(`/api/sym/records/${id}`, {
      method: 'PUT',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ encrypted_secret: newEncValue })
    });
    if (!res.ok) throw new Error(`Server error: ${await res.text()}`);

    // Update local state
    const r = records.find(x => x.id === id);
    if (r) {
      r.encrypted_secret = newEncValue;
      r.updated_at = new Date().toISOString();
    }

    // Update the encrypted display
    const newB64Short = newB64.substring(0, 48);
    const encDisp = document.getElementById('enc-secret-display');
    if (encDisp) {
      encDisp.innerHTML = `<span class="enc-label">%*ENCRYPTED*%</span><span style="color:var(--enc-text);">(${newB64Short}…)</span>`;
    }

    updStatus('Record updated successfully!', 'success');

  } catch (err) {
    updStatus(err.message, 'error');
    console.error(err);
  }
}

/* ── Status helpers ──────────────────────────────────────────────────────── */
function decStatus(msg, type) {
  const el = document.getElementById('dec-status');
  if (!el) return;
  el.className = `status show status-${type}`;
  const spinner = type === 'loading' ? '<span class="spinner"></span> ' : '';
  el.innerHTML = `${spinner}${msg}`;
}
function updStatus(msg, type) {
  const el = document.getElementById('update-status');
  if (!el) return;
  el.className = `status show status-${type}`;
  const spinner = type === 'loading' ? '<span class="spinner"></span> ' : '';
  el.innerHTML = `${spinner}${msg}`;
}

/* ── Init ───────────────────────────────────────────────────────────────── */
loadRecords();
</script>
</body>
</html>
